name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  static-checks:
    name: Static Checks (gofmt, vet, staticcheck, govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          dirty=$(gofmt -l ./go)
          if [ -n "$dirty" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$dirty"
            echo "---- diff ----"
            gofmt -d ./go
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Go test sweep across every SDK package whose tests don't require
  # systemd / privileged operations (those run in test-sys below). The
  # job is split out from test-unit so the existing pkg-only job stays
  # untouched while we add coverage for go/, go/verify/, go/crypto/,
  # go/sys/{exec,fs,network,firewall,inventory,osquery,notify,...} —
  # anything that compiles without an integration build tag.
  test-go-all:
    name: Go unit sweep (race, all SDK packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: go test (excludes integration-tagged files)
        run: go test -race -short ./...

  # Proto-tag completeness checker. Reports every field across
  # proto/pm/v1/ that lacks a validate: tag. Soft-fail today so the
  # large historical backlog (~580 fields per the 2026-06-06 audit)
  # doesn't block unrelated work; promote to hard-fail in a follow-up
  # once the backlog is down to zero.
  proto-validate-coverage:
    name: Proto validate-tag coverage (soft-fail)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run completeness checker
        run: go run ./test/protovalidatecoverage ./proto/pm/v1

  proto-lint:
    name: Proto lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm deps
        run: npm ci || npm install

      - name: buf lint
        run: npx buf lint

      - name: buf format (drift)
        run: npx buf format --diff --exit-code

  # Run `make generate` and assert nothing changed. Catches the
  # "edited a .proto but forgot to regenerate" footgun before it
  # lands in main.
  proto-gen-drift:
    name: Generated-code drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm deps
        run: npm ci || npm install

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc plugins
        run: make install-tools

      - name: make generate
        run: make generate

      - name: Verify no drift
        run: |
          if ! git diff --exit-code -- gen/; then
            echo ""
            echo "::error::generated code in gen/ drifted from proto sources."
            echo "Run 'make generate' locally and commit the result."
            exit 1
          fi

  ts-typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm deps
        run: npm ci || npm install

      - name: tsc --noEmit
        run: npm run typecheck

  ts-test:
    name: TypeScript unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm deps
        run: npm ci || npm install

      - name: Run tests
        run: npm test

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run pkg unit tests
        run: go test -v -race -short ./...
        working-directory: go/pkg

      - name: Run sys unit tests
        run: go test -v -race ./go/sys/user/ -run TestGeneratePassword

  test-sys:
    name: Integration Tests (sys/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: sdk

      - name: Build test image
        run: docker build -f sdk/test/Dockerfile.integration -t pm-sdk-test .

      - name: Start systemd container
        run: docker run -d --privileged --name pm-sdk-test pm-sdk-test

      - name: Wait for systemd
        run: |
          for i in $(seq 1 30); do
            if docker exec pm-sdk-test systemctl is-system-running --wait 2>/dev/null; then
              break
            fi
            sleep 0.5
          done

      - name: Run sys integration tests
        run: |
          docker exec -w /workspace pm-sdk-test \
            runuser -u power-manage -- /usr/local/go/bin/go test \
              -v -tags=integration -count=1 -timeout=10m \
              ./sdk/go/sys/exec/ ./sdk/go/sys/fs/ ./sdk/go/sys/user/ ./sdk/go/sys/service/

      - name: Cleanup
        if: always()
        run: docker rm -f pm-sdk-test 2>/dev/null || true

  test-apt:
    name: Integration Tests (apt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Update apt cache
        run: sudo apt-get update

      - name: Run integration tests
        run: go test -v -race ./...
        working-directory: go/pkg

      - name: Run tests with coverage
        run: go test -coverprofile=coverage-apt.out ./...
        working-directory: go/pkg

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        with:
          name: coverage-apt
          path: go/pkg/coverage-apt.out

  test-dnf:
    name: Integration Tests (dnf)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Go
        run: dnf install -y golang

      - name: Update dnf cache
        run: dnf makecache

      - name: Run integration tests
        run: go test -v ./...
        working-directory: go/pkg

      - name: Run tests with coverage
        run: go test -coverprofile=coverage-dnf.out ./...
        working-directory: go/pkg

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        with:
          name: coverage-dnf
          path: go/pkg/coverage-dnf.out

  coverage-report:
    name: Coverage Report
    needs: [test-apt, test-dnf]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download apt coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-apt
          path: coverage

      - name: Download dnf coverage
        uses: actions/download-artifact@v5
        with:
          name: coverage-dnf
          path: coverage

      - name: Display coverage
        run: |
          echo "=== APT Coverage ==="
          go tool cover -func=coverage/coverage-apt.out | tail -1
          echo ""
          echo "=== DNF Coverage ==="
          go tool cover -func=coverage/coverage-dnf.out | tail -1
