name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "$GITHUB_REF_NAME" == *-rc* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Generate TypeScript SDK
        run: npx buf generate

      - name: Prepare release assets
        run: |
          mkdir -p release

          # Proto source files
          tar czf release/proto.tar.gz -C proto .

          # TypeScript SDK
          tar czf release/ts-sdk.tar.gz -C gen/ts .

          cd release && sha256sum * > SHA256SUMS

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              for entry in "feat:Features" "fix:Bug Fixes" "perf:Performance" "refactor:Refactoring" "docs:Documentation" "test:Tests" "chore:Chores"; do
                prefix="${entry%%:*}"
                label="${entry#*:}"
                items=$(git log --pretty=format:"%s" "${PREV_TAG}..${GITHUB_REF_NAME}" | grep "^${prefix}[:(]" | sed "s/^${prefix}[^:]*: //" || true)
                if [ -n "$items" ]; then
                  echo "### ${label}"
                  echo "$items" | while IFS= read -r line; do echo "- ${line}"; done
                  echo ""
                fi
              done
              others=$(git log --pretty=format:"%s" "${PREV_TAG}..${GITHUB_REF_NAME}" | grep -v "^\(feat\|fix\|perf\|refactor\|docs\|test\|chore\)[:(]" || true)
              if [ -n "$others" ]; then
                echo "### Other Changes"
                echo "$others" | while IFS= read -r line; do echo "- ${line}"; done
                echo ""
              fi
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
            else
              echo "Initial release."
            fi
          } > changelog.md

      - name: Generate release body
        run: |
          cat changelog.md > body.md
          cat >> body.md <<'EOF'

          ## TypeScript SDK

          Download the pre-generated TypeScript types:

          ```bash
          curl -fsSL https://github.com/MANCHTOOLS/power-manage-sdk/releases/download/${{ github.ref_name }}/ts-sdk.tar.gz | tar xz -C src/lib/gen/pm/v1/
          ```

          ## Proto Source

          ```bash
          curl -fsSL https://github.com/MANCHTOOLS/power-manage-sdk/releases/download/${{ github.ref_name }}/proto.tar.gz | tar xz -C proto/
          ```

          ## Go SDK

          ```go
          go get github.com/manchtools/power-manage/sdk@${{ github.ref_name }}
          ```

          ## Assets

          | File | Contents |
          |------|----------|
          | `ts-sdk.tar.gz` | Generated TypeScript types (protobuf-es) |
          | `proto.tar.gz` | Protocol Buffer source definitions |
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          name: Power Manage SDK ${{ steps.version.outputs.version }}
          files: release/*
          body_path: body.md
