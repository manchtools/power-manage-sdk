syntax = "proto3";

package pm.v1;

option go_package = "github.com/manchtools/power-manage-sdk/gen/go/pm/v1;pmv1";

// ============================================================================
// Device Enrollment Service (Agent Local Socket)
//
// This service runs on the agent's local unix socket (/run/pm-agent/enroll.sock)
// and provides enrollment functionality for registering the agent with a
// PM control server. No sudo required — the registration token is the
// authorization.
// ============================================================================

service DeviceAuthService {
  // Enroll the agent with a PM server (called by CLI, no sudo required).
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // Check whether the agent is currently enrolled.
  rpc GetEnrollmentStatus(GetEnrollmentStatusRequest) returns (GetEnrollmentStatusResponse);
}

// ============================================================================
// Enrollment (Socket-based, no sudo required)
// ============================================================================

message EnrollRequest {
  // @gotags: validate:"required,url"
  string server_url = 1; // Control server URL (https only — enforced agent-side)
  // @gotags: validate:"required"
  string token = 2; // Registration token from web UI
  // Optional out-of-band CA fingerprint pin: the 64-char hex SHA-256 of
  // the control CA certificate DER. When set, the agent verifies the CA
  // returned by registration matches this pin BEFORE trusting it,
  // defending against a first-enrollment trust-anchor swap. Delivered by
  // the operator alongside the token (e.g. power-manage://…?token=…&pin=…).
  // Absent = trust-on-first-use (accepted residual). Case-insensitive:
  // the enroll CLI strips colons and lowercases the operator's value
  // (openssl emits uppercase, colon-separated) and the agent compares
  // with EqualFold, so the `hexadecimal` tag is intentionally permissive
  // on case. Field 3 (formerly the removed skip_verify bool) is reused in
  // place — EnrollRequest only crosses the local enrollment socket within
  // one agent binary, so there is no cross-version wire concern.
  // @gotags: validate:"omitempty,len=64,hexadecimal"
  string ca_fingerprint_pin = 3;
}

message EnrollResponse {
  // The other two fields below are conditioned on this — success=true
  // means device_id is populated and error is empty; success=false
  // means error is populated and device_id is empty. The bool itself
  // is unconditional but we tag it explicit-required so the
  // proto-validate coverage tool stops counting it as a gap (audit
  // finding #2 / #73). Bools always have a default value, so
  // "required" here means "must be present in the wire payload" —
  // protovalidate enforces no extra runtime check beyond that.
  // @gotags: validate:"required"
  bool success = 1;
  // @gotags: validate:"omitempty,ulid"
  string device_id = 2; // Assigned device ID on success
  // @gotags: validate:"omitempty,max=4096"
  string error = 3; // Error message on failure
}

message GetEnrollmentStatusRequest {}

message GetEnrollmentStatusResponse {
  // @gotags: validate:"required"
  bool enrolled = 1;
  // @gotags: validate:"omitempty,ulid"
  string device_id = 2; // Empty if not enrolled
}
