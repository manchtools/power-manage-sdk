syntax = "proto3";

package pm.v1;

option go_package = "github.com/manchtools/power-manage-sdk/gen/go/pm/v1;pmv1";

// Unique identifier for an action instance
message ActionId {
  // @gotags: validate:"required,ulid"
  string value = 1;
}

// Unique identifier for a device/agent
message DeviceId {
  // @gotags: validate:"required,ulid"
  string value = 1;
}

// Execution status for any action
enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_PENDING = 1;
  EXECUTION_STATUS_RUNNING = 2;
  EXECUTION_STATUS_SUCCESS = 3;
  EXECUTION_STATUS_FAILED = 4;
  EXECUTION_STATUS_SKIPPED = 5;
  EXECUTION_STATUS_TIMEOUT = 6;
  // Queued for delayed dispatch — the Dispatch* request carried a
  // run_at timestamp, so the server deferred the dispatch until
  // that future time. Transitions to PENDING / RUNNING when the
  // deferred task fires, then onward to a terminal status the same
  // way as any other execution.
  EXECUTION_STATUS_SCHEDULED = 7;
  // Operator cancelled the dispatch via
  // ControlService.CancelExecution. CancelExecution acts only
  // while the execution is still in SCHEDULED or PENDING — once
  // the agent has picked it up (RUNNING) or it has reached a
  // terminal status, the cancel is a no-op and the row keeps its
  // observed outcome.
  EXECUTION_STATUS_CANCELLED = 8;
  // The action is structurally inapplicable to this device — e.g.
  // security_only on a package manager with no security-patch
  // scoping, a DEB action on an rpm host, a FLATPAK action with no
  // flatpak installed. Terminal, non-error: nothing was executed
  // (fail-closed), and the machine-readable reason travels in the
  // result error field. Distinct from SKIPPED (a run the server or
  // agent chose not to perform this time, e.g. maintenance window)
  // in that NOT_APPLICABLE is a property of the device+action pair,
  // not of the moment.
  EXECUTION_STATUS_NOT_APPLICABLE = 9;
}

// Desired state for stateful actions
enum DesiredState {
  DESIRED_STATE_PRESENT = 0; // Install/create/enable
  DESIRED_STATE_ABSENT = 1; // Remove/delete/disable
}

// Assignment mode determines how an action is applied to a target
enum AssignmentMode {
  ASSIGNMENT_MODE_REQUIRED = 0; // Mandatory: action will be applied
  ASSIGNMENT_MODE_AVAILABLE = 1; // Optional: user can select
  ASSIGNMENT_MODE_EXCLUDED = 2; // Blocked: action won't be applied on this target
  ASSIGNMENT_MODE_UNINSTALL = 3; // Apply action but force desired_state to ABSENT
}

// AssignmentSourceType identifies what kind of policy artefact an
// Assignment links to a target. The wire enum replaces the legacy
// stringly-typed `source_type` field (action / action_set /
// definition / compliance_policy). The event-store payload still
// keeps the lowercase string form for backward replay; conversion
// happens at the RPC boundary.
enum AssignmentSourceType {
  ASSIGNMENT_SOURCE_TYPE_UNSPECIFIED = 0;
  ASSIGNMENT_SOURCE_TYPE_ACTION = 1;
  ASSIGNMENT_SOURCE_TYPE_ACTION_SET = 2;
  ASSIGNMENT_SOURCE_TYPE_DEFINITION = 3;
  ASSIGNMENT_SOURCE_TYPE_COMPLIANCE_POLICY = 4;
}

// AssignmentTargetType identifies what kind of subject an Assignment
// applies to. Same wire/event-store split as AssignmentSourceType:
// the proto uses the enum, the JSONB event payload keeps the legacy
// lowercase string (device / device_group / user / user_group).
enum AssignmentTargetType {
  ASSIGNMENT_TARGET_TYPE_UNSPECIFIED = 0;
  ASSIGNMENT_TARGET_TYPE_DEVICE = 1;
  ASSIGNMENT_TARGET_TYPE_DEVICE_GROUP = 2;
  ASSIGNMENT_TARGET_TYPE_USER = 3;
  ASSIGNMENT_TARGET_TYPE_USER_GROUP = 4;
}

// RoleGrantScopeKind names which kind of group anchors a scoped role
// grant (manchtools/power-manage-server#7). Kinds are exclusive — a
// grant is either device-group-scoped, user-group-scoped, or
// unscoped/global (UNSPECIFIED). Permissions declare a single target
// kind on their PermissionInfo; a grant whose scope_kind doesn't
// match every permission in the role is rejected at the
// role-assignment handler.
//
// Wire/projection split: the proto carries the enum on the wire;
// the user_roles_projection / user_group_roles_projection rows
// store the lowercase string form ("device_group" / "user_group") so
// the SQL CHECK constraint reads naturally and existing event-replay
// keeps working. Conversion happens at the projector boundary.
enum RoleGrantScopeKind {
  // UNSPECIFIED on a grant means the grant is unscoped/global —
  // matches the historical NULL-scope grant shape and is
  // backward-compatible with grants emitted before #7.
  ROLE_GRANT_SCOPE_KIND_UNSPECIFIED = 0;
  ROLE_GRANT_SCOPE_KIND_DEVICE_GROUP = 1;
  ROLE_GRANT_SCOPE_KIND_USER_GROUP = 2;
}

// PermissionTargetKind classifies the target kind a permission acts
// on, which determines which RoleGrantScopeKind it accepts on a
// scoped grant (manchtools/power-manage-server#7). Returned on
// PermissionInfo by ListPermissions so the role-builder UI can
// surface scopable permissions and gate the scope picker by kind.
//
// Fail-closed semantic: a permission that does not explicitly
// declare a target kind is NOT scopable — granting it with any
// scope_kind is rejected by the role-assignment handler. New
// permissions added without an explicit kind silently land at the
// safe default. Use DEVICE / USER ONLY when the permission's
// authorization decision can be expressed as "scope-id matches a
// group containing this device/user".
enum PermissionTargetKind {
  // UNSPECIFIED — not scopable. Org-tier permissions
  // (CreateRole, server settings, IDP/SCIM, audit) and any
  // permission whose authorization decision can't be expressed as
  // a group-membership check stay at UNSPECIFIED.
  PERMISSION_TARGET_KIND_UNSPECIFIED = 0;
  // DEVICE — scopable with RoleGrantScopeKind=DEVICE_GROUP only.
  PERMISSION_TARGET_KIND_DEVICE = 1;
  // USER — scopable with RoleGrantScopeKind=USER_GROUP only.
  PERMISSION_TARGET_KIND_USER = 2;
}

// DeviceStatus replaces the legacy stringly-typed Device.status /
// ListDevicesRequest.status_filter ("online" / "offline"). The status
// is computed by the server from the device's last_seen_at timestamp,
// so it is wire-only — there is no event payload or DB column to
// translate. UNSPECIFIED on the request means "no status filter".
enum DeviceStatus {
  DEVICE_STATUS_UNSPECIFIED = 0;
  DEVICE_STATUS_ONLINE = 1;
  DEVICE_STATUS_OFFLINE = 2;
}

// SearchScope identifies which search index a SearchRequest targets,
// and which index a SearchResult came from. Replaces the legacy
// stringly-typed scope field. UNSPECIFIED on the request means "all
// scopes" — previously expressed by an empty string.
enum SearchScope {
  SEARCH_SCOPE_UNSPECIFIED = 0;
  SEARCH_SCOPE_ACTIONS = 1;
  SEARCH_SCOPE_ACTION_SETS = 2;
  SEARCH_SCOPE_DEFINITIONS = 3;
  SEARCH_SCOPE_COMPLIANCE_POLICIES = 4;
  SEARCH_SCOPE_DEVICES = 5;
  SEARCH_SCOPE_USERS = 6;
  SEARCH_SCOPE_DEVICE_GROUPS = 7;
  SEARCH_SCOPE_USER_GROUPS = 8;
  SEARCH_SCOPE_EXECUTIONS = 9;
  SEARCH_SCOPE_AUDIT_EVENTS = 10;
}

// SortField is the column a Search orders by. Shared across all scopes
// (the union of sortable columns); the server validates per-scope validity
// (scopeSortableFields) and maps each value to that scope's index field.
// UNSPECIFIED means "use the scope's default sort".
enum SortField {
  SORT_FIELD_UNSPECIFIED = 0;
  SORT_FIELD_NAME = 1;
  SORT_FIELD_TYPE = 2;
  SORT_FIELD_HOSTNAME = 3;
  SORT_FIELD_COMPLIANCE_STATUS = 4;
  SORT_FIELD_EMAIL = 5;
  SORT_FIELD_DISPLAY_NAME = 6;
  SORT_FIELD_DISABLED = 7;
  SORT_FIELD_MEMBER_COUNT = 8;
  SORT_FIELD_STATUS = 9;
  SORT_FIELD_ACTION_TYPE = 10;
  SORT_FIELD_DEVICE_HOSTNAME = 11;
  SORT_FIELD_ACTOR_TYPE = 12;
  SORT_FIELD_STREAM_TYPE = 13;
  SORT_FIELD_EVENT_TYPE = 14;
  SORT_FIELD_RULE_COUNT = 15;
  SORT_FIELD_LAST_LOGIN_AT = 16;
  SORT_FIELD_CREATED_AT = 17;
  SORT_FIELD_UPDATED_AT = 18;
  SORT_FIELD_LAST_SEEN_AT = 19;
  SORT_FIELD_REGISTERED_AT = 20;
  SORT_FIELD_OCCURRED_AT = 21;
}

// SortDirection is the order for a Search sort. UNSPECIFIED lets the
// server pick the field's natural default.
enum SortDirection {
  SORT_DIRECTION_UNSPECIFIED = 0;
  SORT_DIRECTION_ASC = 1;
  SORT_DIRECTION_DESC = 2;
}

// IdentityProviderType identifies the auth protocol an
// IdentityProvider speaks. Today only OIDC ships, but the enum is
// forward-looking — SAML2, LDAP, etc. can be added without another
// stringly-typed migration. Like AssignmentSourceType, the event
// payload and DB column keep the lowercase string form for backward
// replay; conversion happens at the RPC boundary.
enum IdentityProviderType {
  IDENTITY_PROVIDER_TYPE_UNSPECIFIED = 0;
  IDENTITY_PROVIDER_TYPE_OIDC = 1;
}

// RotationReason classifies why a credential rotation happened. The
// agent emits INITIAL (first time the action ran on the device, no
// previous credential to retain), SCHEDULED (interval-based policy
// rotation), and AUTH_GRACE (LPS only — user authenticated since the
// last rotation and the grace period has now elapsed). Same wire /
// event-store split as the other PR-A/B enums: the proto carries the
// typed enum, the JSONB event payload and projection columns keep the
// lowercase string form ("initial" / "scheduled" / "auth_grace") for
// backward replay; conversion happens at the RPC boundary. Used by
// LUKS passphrase rotations (INITIAL / SCHEDULED only — LUKS does not
// run the auth-grace path) and LPS password rotations.
enum RotationReason {
  ROTATION_REASON_UNSPECIFIED = 0;
  ROTATION_REASON_INITIAL = 1;
  ROTATION_REASON_SCHEDULED = 2;
  ROTATION_REASON_AUTH_GRACE = 3;
}

// LuksRevocationStatus tracks the lifecycle of a LUKS passphrase
// revocation. NONE is the wire-default for keys that have not been
// revoked. Once an admin triggers revocation the projection moves the
// key through DISPATCHED (task enqueued) and then SUCCESS or FAILED
// based on the agent's response. Same wire / event-store split as the
// other PR-D enums: the proto carries the typed enum, the projection
// column keeps the lowercase string form ("" / "dispatched" /
// "success" / "failed") for backward replay; conversion happens at
// the RPC boundary.
enum LuksRevocationStatus {
  LUKS_REVOCATION_STATUS_UNSPECIFIED = 0;
  LUKS_REVOCATION_STATUS_NONE = 1;
  LUKS_REVOCATION_STATUS_DISPATCHED = 2;
  LUKS_REVOCATION_STATUS_SUCCESS = 3;
  LUKS_REVOCATION_STATUS_FAILED = 4;
}

// Structured error detail attached to Connect-RPC errors.
message ErrorDetail {
  // Machine-readable error code (e.g., "user_not_found", "email_already_exists").
  // Capped at 128 chars — every existing code uses snake_case names well
  // under that, and the bound prevents a misbehaving caller (or a future
  // codepath that constructs the detail from user-supplied input) from
  // pushing arbitrarily long payloads into client-side error toasts.
  // @gotags: validate:"max=128"
  string code = 1;
  // Server-generated request ID for correlating errors with server logs.
  // ULIDs are 26 chars; bound at 64 to leave headroom for prefixes
  // without inviting unbounded growth.
  // @gotags: validate:"max=64"
  string request_id = 2;
}

// Compliance status for a device based on detection scripts
enum ComplianceStatus {
  COMPLIANCE_STATUS_UNKNOWN = 0;
  COMPLIANCE_STATUS_COMPLIANT = 1;
  COMPLIANCE_STATUS_NON_COMPLIANT = 2;
  COMPLIANCE_STATUS_IN_GRACE_PERIOD = 3;
}

// MaintenanceWindow gates action dispatch by device-local wall-clock
// time. A window is a positive allowlist: when the schedule is empty
// the window is "always allowed" — the feature is opt-in and existing
// groups carry an empty window with zero behavioural change.
//
// Multiple entries combine as OR. The agent evaluates against
// time.Now().Local() at dispatch time so "02:00 local" means 02:00
// wherever the device runs; the server never tries to interpret the
// device's timezone. See manchtools/power-manage-server#58.
message MaintenanceWindow {
  // @gotags: validate:"omitempty,dive"
  repeated MaintenanceWindowEntry schedule = 1;
}

// One entry in a MaintenanceWindow: a set of weekdays and a single
// allowed clock range. `allow` uses 24-hour HH:MM-HH:MM in local time
// (e.g. "22:00-06:00"). Crossing midnight is supported: when the
// range's start is greater than its end the window continues into the
// next day. `days` lists the weekdays the entry applies to using the
// lowercase three-letter abbreviations mon|tue|wed|thu|fri|sat|sun.
message MaintenanceWindowEntry {
  // @gotags: validate:"required,min=1,max=7,dive,oneof=mon tue wed thu fri sat sun"
  repeated string days = 1;
  // @gotags: validate:"required,min=11,max=11"
  string allow = 2;
}

// Output from command execution
message CommandOutput {
  // @gotags: validate:"omitempty"
  int32 exit_code = 1;
  // @gotags: validate:"omitempty,max=1048576"
  string stdout = 2;
  // @gotags: validate:"omitempty,max=1048576"
  string stderr = 3;
}
