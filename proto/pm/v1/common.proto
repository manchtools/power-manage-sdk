syntax = "proto3";

package pm.v1;

option go_package = "github.com/manchtools/power-manage/sdk/gen/go/pm/v1;pmv1";

// Unique identifier for an action instance
message ActionId {
  // @gotags: validate:"required,ulid"
  string value = 1;
}

// Unique identifier for a device/agent
message DeviceId {
  // @gotags: validate:"required,ulid"
  string value = 1;
}

// Execution status for any action
enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_PENDING = 1;
  EXECUTION_STATUS_RUNNING = 2;
  EXECUTION_STATUS_SUCCESS = 3;
  EXECUTION_STATUS_FAILED = 4;
  EXECUTION_STATUS_SKIPPED = 5;
  EXECUTION_STATUS_TIMEOUT = 6;
  // Queued for delayed dispatch — the Dispatch* request carried a
  // run_at timestamp, so the server deferred the dispatch until
  // that future time. Transitions to PENDING / RUNNING when the
  // deferred task fires, then onward to a terminal status the same
  // way as any other execution.
  EXECUTION_STATUS_SCHEDULED = 7;
  // Operator cancelled the dispatch via
  // ControlService.CancelExecution. CancelExecution acts only
  // while the execution is still in SCHEDULED or PENDING — once
  // the agent has picked it up (RUNNING) or it has reached a
  // terminal status, the cancel is a no-op and the row keeps its
  // observed outcome.
  EXECUTION_STATUS_CANCELLED = 8;
}

// Desired state for stateful actions
enum DesiredState {
  DESIRED_STATE_PRESENT = 0;  // Install/create/enable
  DESIRED_STATE_ABSENT = 1;   // Remove/delete/disable
}

// Assignment mode determines how an action is applied to a target
enum AssignmentMode {
  ASSIGNMENT_MODE_REQUIRED = 0;  // Mandatory: action will be applied
  ASSIGNMENT_MODE_AVAILABLE = 1; // Optional: user can select
  ASSIGNMENT_MODE_EXCLUDED = 2;  // Blocked: action won't be applied on this target
  ASSIGNMENT_MODE_UNINSTALL = 3; // Apply action but force desired_state to ABSENT
}

// AssignmentSourceType identifies what kind of policy artefact an
// Assignment links to a target. The wire enum replaces the legacy
// stringly-typed `source_type` field (action / action_set /
// definition / compliance_policy). The event-store payload still
// keeps the lowercase string form for backward replay; conversion
// happens at the RPC boundary.
enum AssignmentSourceType {
  ASSIGNMENT_SOURCE_TYPE_UNSPECIFIED = 0;
  ASSIGNMENT_SOURCE_TYPE_ACTION = 1;
  ASSIGNMENT_SOURCE_TYPE_ACTION_SET = 2;
  ASSIGNMENT_SOURCE_TYPE_DEFINITION = 3;
  ASSIGNMENT_SOURCE_TYPE_COMPLIANCE_POLICY = 4;
}

// AssignmentTargetType identifies what kind of subject an Assignment
// applies to. Same wire/event-store split as AssignmentSourceType:
// the proto uses the enum, the JSONB event payload keeps the legacy
// lowercase string (device / device_group / user / user_group).
enum AssignmentTargetType {
  ASSIGNMENT_TARGET_TYPE_UNSPECIFIED = 0;
  ASSIGNMENT_TARGET_TYPE_DEVICE = 1;
  ASSIGNMENT_TARGET_TYPE_DEVICE_GROUP = 2;
  ASSIGNMENT_TARGET_TYPE_USER = 3;
  ASSIGNMENT_TARGET_TYPE_USER_GROUP = 4;
}

// Structured error detail attached to Connect-RPC errors.
message ErrorDetail {
  // Machine-readable error code (e.g., "user_not_found", "email_already_exists").
  // Capped at 128 chars — every existing code uses snake_case names well
  // under that, and the bound prevents a misbehaving caller (or a future
  // codepath that constructs the detail from user-supplied input) from
  // pushing arbitrarily long payloads into client-side error toasts.
  // @gotags: validate:"max=128"
  string code = 1;
  // Server-generated request ID for correlating errors with server logs.
  // ULIDs are 26 chars; bound at 64 to leave headroom for prefixes
  // without inviting unbounded growth.
  // @gotags: validate:"max=64"
  string request_id = 2;
}

// Compliance status for a device based on detection scripts
enum ComplianceStatus {
  COMPLIANCE_STATUS_UNKNOWN = 0;
  COMPLIANCE_STATUS_COMPLIANT = 1;
  COMPLIANCE_STATUS_NON_COMPLIANT = 2;
  COMPLIANCE_STATUS_IN_GRACE_PERIOD = 3;
}

// MaintenanceWindow gates action dispatch by device-local wall-clock
// time. A window is a positive allowlist: when the schedule is empty
// the window is "always allowed" — the feature is opt-in and existing
// groups carry an empty window with zero behavioural change.
//
// Multiple entries combine as OR. The agent evaluates against
// time.Now().Local() at dispatch time so "02:00 local" means 02:00
// wherever the device runs; the server never tries to interpret the
// device's timezone. See manchtools/power-manage-server#58.
message MaintenanceWindow {
  // @gotags: validate:"omitempty,dive"
  repeated MaintenanceWindowEntry schedule = 1;
}

// One entry in a MaintenanceWindow: a set of weekdays and a single
// allowed clock range. `allow` uses 24-hour HH:MM-HH:MM in local time
// (e.g. "22:00-06:00"). Crossing midnight is supported: when the
// range's start is greater than its end the window continues into the
// next day. `days` lists the weekdays the entry applies to using the
// lowercase three-letter abbreviations mon|tue|wed|thu|fri|sat|sun.
message MaintenanceWindowEntry {
  // @gotags: validate:"required,min=1,max=7,dive,oneof=mon tue wed thu fri sat sun"
  repeated string days = 1;
  // @gotags: validate:"required,min=11,max=11"
  string allow = 2;
}

// Output from command execution
message CommandOutput {
  // @gotags: validate:"omitempty"
  int32 exit_code = 1;
  // @gotags: validate:"omitempty,max=1048576"
  string stdout = 2;
  // @gotags: validate:"omitempty,max=1048576"
  string stderr = 3;
}
