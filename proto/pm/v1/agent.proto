syntax = "proto3";

package pm.v1;

option go_package = "github.com/manchtools/power-manage/sdk/gen/go/pm/v1;pmv1";

import "google/protobuf/duration.proto";
import "pm/v1/common.proto";
import "pm/v1/actions.proto";

// ============================================================================
// Agent Service
// ============================================================================

service AgentService {
  // Bidirectional stream for agent-server communication
  rpc Stream(stream AgentMessage) returns (stream ServerMessage);

  // Sync assigned actions (called by agent after successful connection)
  // Returns all actions currently assigned to the device for local storage
  rpc SyncActions(SyncActionsRequest) returns (SyncActionsResponse);

  // Validate a one-time LUKS token and return action details + complexity requirements
  // Used by the CLI subcommand (power-manage-agent luks set-passphrase --token XXX)
  rpc ValidateLuksToken(ValidateLuksTokenRequest) returns (ValidateLuksTokenResponse);
}

// ============================================================================
// Agent -> Server
// ============================================================================

message AgentMessage {
  // @gotags: validate:"required,ulid"
  string id = 1;

  oneof payload {
    // @gotags: validate:"omitempty"
    Hello hello = 10;
    // @gotags: validate:"omitempty"
    Heartbeat heartbeat = 11;
    // @gotags: validate:"omitempty"
    ActionResult action_result = 20;
    // @gotags: validate:"omitempty"
    OutputChunk output_chunk = 21;
    // @gotags: validate:"omitempty"
    OSQueryResult query_result = 30;
    // @gotags: validate:"omitempty"
    DeviceInventory inventory = 31;
    // @gotags: validate:"omitempty"
    SecurityAlert security_alert = 40;
    // LUKS key management (via stream, not separate RPCs)
    // @gotags: validate:"omitempty"
    GetLuksKeyRequest get_luks_key = 50;
    // @gotags: validate:"omitempty"
    StoreLuksKeyRequest store_luks_key = 51;
    // @gotags: validate:"omitempty"
    RevokeLuksDeviceKeyResult revoke_luks_device_key_result = 52;
    // Log query result (journalctl output)
    // @gotags: validate:"omitempty"
    LogQueryResult log_query_result = 60;
    // Remote terminal (PTY) session messages
    // @gotags: validate:"omitempty"
    TerminalOutput terminal_output = 70;
    // @gotags: validate:"omitempty"
    TerminalStateChange terminal_state_change = 71;
  }
}

// ============================================================================
// Output Streaming
// ============================================================================

// Output stream type for stdout/stderr differentiation
enum OutputStreamType {
  OUTPUT_STREAM_TYPE_UNSPECIFIED = 0;
  OUTPUT_STREAM_TYPE_STDOUT = 1;
  OUTPUT_STREAM_TYPE_STDERR = 2;
}

// Output chunk sent during action execution (Agent -> Server)
message OutputChunk {
  // @gotags: validate:"required,ulid"
  string execution_id = 1;
  // @gotags: validate:"required,ne=0"
  OutputStreamType stream = 2;
  // @gotags: validate:"required,max=65536"
  bytes data = 3;
  // @gotags: validate:"gte=0"
  int64 sequence = 4;
}

message Hello {
  // @gotags: validate:"required"
  DeviceId device_id = 1;
  // @gotags: validate:"required,min=1,max=32"
  string agent_version = 2;
  // @gotags: validate:"required,min=1,max=253"
  string hostname = 3;
  // @gotags: validate:"omitempty,max=4096"
  string auth_token = 4;
  // @gotags: validate:"omitempty,max=16"
  string arch = 5;
}

message Heartbeat {
  // @gotags: validate:"omitempty"
  google.protobuf.Duration uptime = 1;
  // @gotags: validate:"omitempty,gte=0,lte=100"
  float cpu_percent = 2;
  // @gotags: validate:"omitempty,gte=0,lte=100"
  float memory_percent = 3;
  // @gotags: validate:"omitempty,gte=0,lte=100"
  float disk_percent = 4;
}

// ============================================================================
// Security Alerts
// ============================================================================

// Security alert types for audit logging
enum SecurityAlertType {
  SECURITY_ALERT_TYPE_UNSPECIFIED = 0;
  // Someone attempted to reassign the agent to a different server
  SECURITY_ALERT_TYPE_SERVER_REASSIGNMENT_ATTEMPT = 1;
  // Credential file tampering detected
  SECURITY_ALERT_TYPE_CREDENTIAL_TAMPERING = 2;
  // Invalid certificate presented
  SECURITY_ALERT_TYPE_INVALID_CERTIFICATE = 3;
}

// Security alert sent from agent to server for audit logging
message SecurityAlert {
  // @gotags: validate:"required,ne=0"
  SecurityAlertType type = 1;
  // @gotags: validate:"required,min=1,max=1024"
  string message = 2;
  // Additional context as key-value pairs
  // @gotags: validate:"omitempty,dive,keys,max=64,endkeys,max=1024"
  map<string, string> details = 3;
}

// ============================================================================
// Server -> Agent
// ============================================================================

message ServerMessage {
  // @gotags: validate:"required,ulid"
  string id = 1;

  oneof payload {
    // @gotags: validate:"omitempty"
    Welcome welcome = 10;
    // @gotags: validate:"omitempty"
    ActionDispatch action = 20;
    // @gotags: validate:"omitempty"
    OSQuery query = 30;
    // @gotags: validate:"omitempty"
    RequestInventory request_inventory = 31;
    // @gotags: validate:"omitempty"
    Error error = 40;
    // LUKS key management responses + instant actions
    // @gotags: validate:"omitempty"
    GetLuksKeyResponse get_luks_key = 50;
    // @gotags: validate:"omitempty"
    StoreLuksKeyResponse store_luks_key = 51;
    // @gotags: validate:"omitempty"
    RevokeLuksDeviceKey revoke_luks_device_key = 52;
    // Log query dispatch (journalctl)
    // @gotags: validate:"omitempty"
    LogQuery log_query = 60;
    // Remote terminal (PTY) session control
    // @gotags: validate:"omitempty"
    TerminalStart terminal_start = 70;
    // @gotags: validate:"omitempty"
    TerminalInput terminal_input = 71;
    // @gotags: validate:"omitempty"
    TerminalResize terminal_resize = 72;
    // @gotags: validate:"omitempty"
    TerminalStop terminal_stop = 73;
  }
}

message Welcome {
  // @gotags: validate:"required,min=1,max=32"
  string server_version = 1;
  // @gotags: validate:"omitempty"
  google.protobuf.Duration heartbeat_interval = 2;
  // Base URL for browser-based device login (configurable, defaults to built-in PM web app).
  // Used by PAM module to open the OIDC login page for display manager sessions.
  string device_login_url = 3;

  // Fields 4-6 removed (old auto-update mechanism, replaced by ACTION_TYPE_AGENT_UPDATE)
  reserved 4, 5, 6;
  reserved "latest_agent_version", "update_url", "update_checksum";
}

message ActionDispatch {
  // @gotags: validate:"required"
  Action action = 1;
}

message Error {
  // @gotags: validate:"required,min=1,max=64"
  string code = 1;
  // @gotags: validate:"required,min=1,max=1024"
  string message = 2;
}

// ============================================================================
// OS Query (osquery-compatible)
// ============================================================================

message OSQuery {
  // @gotags: validate:"required,ulid"
  string query_id = 1;
  // @gotags: validate:"required_without=RawSql,omitempty,min=1,max=64"
  string table = 2;
  // @gotags: validate:"omitempty,dive,max=64"
  repeated string columns = 3;
  // @gotags: validate:"omitempty,dive"
  repeated OSQueryCondition where = 4;
  // @gotags: validate:"omitempty,gte=0,lte=10000"
  int32 limit = 5;
  // Raw SQL query — when set, table/columns/where/limit are ignored.
  // @gotags: validate:"omitempty,max=4096"
  string raw_sql = 6;
}

message OSQueryCondition {
  // @gotags: validate:"required,min=1,max=64"
  string column = 1;
  // @gotags: validate:"required"
  OSQueryOp op = 2;
  // @gotags: validate:"required,max=4096"
  string value = 3;
}

enum OSQueryOp {
  OS_QUERY_OP_UNSPECIFIED = 0;
  OS_QUERY_OP_EQ = 1;
  OS_QUERY_OP_NE = 2;
  OS_QUERY_OP_GT = 3;
  OS_QUERY_OP_LT = 4;
  OS_QUERY_OP_GE = 5;
  OS_QUERY_OP_LE = 6;
  OS_QUERY_OP_LIKE = 7;
  OS_QUERY_OP_GLOB = 8;
}

message OSQueryResult {
  // @gotags: validate:"required,ulid"
  string query_id = 1;
  // @gotags: validate:"omitempty"
  bool success = 2;
  // @gotags: validate:"omitempty,max=1024"
  string error = 3;
  // @gotags: validate:"omitempty,dive"
  repeated OSQueryRow rows = 4;
}

message OSQueryRow {
  // @gotags: validate:"omitempty,dive,keys,max=64,endkeys,max=65536"
  map<string, string> data = 1;
}

// ============================================================================
// Device Inventory (Agent -> Server, cached hardware/software data)
// ============================================================================

message DeviceInventory {
  repeated InventoryTable tables = 1;
}

message InventoryTable {
  // @gotags: validate:"required,min=1,max=64"
  string table_name = 1;
  // @gotags: validate:"omitempty,dive"
  repeated OSQueryRow rows = 2;
}

// Server -> Agent: request fresh inventory collection
message RequestInventory {}

// ============================================================================
// Standard OS Query Tables
// ============================================================================
//
// os_version: name, version, major, minor, patch, arch, platform, platform_like
// system_info: hostname, cpu_type, cpu_brand, cpu_cores, physical_memory
// kernel_info: version, path
// uptime: days, hours, minutes, seconds, total_seconds
// users: uid, gid, username, directory, shell
// processes: pid, name, path, cmdline, state, uid, parent
// packages: name, version, arch, source
// deb_packages: name, version, arch, status
// rpm_packages: name, version, release, arch
// systemd_units: id, type, load_state, active_state, sub_state
// listening_ports: pid, port, protocol, address
// mounts: device, path, type
// memory_info: memory_total, memory_free, swap_total, swap_free

// ============================================================================
// LUKS Key Management (via stream)
// ============================================================================

// Agent requests the current managed passphrase for a LUKS action.
// device_id is omitted — the gateway knows the device from the mTLS cert.
message GetLuksKeyRequest {
  // @gotags: validate:"required,ulid"
  string action_id = 1;
}

message GetLuksKeyResponse {
  // @gotags: validate:"required,min=1"
  string passphrase = 1;
}

// Agent stores a new managed passphrase on the server.
// The server must confirm receipt before the agent removes the old key from LUKS.
message StoreLuksKeyRequest {
  // @gotags: validate:"required,ulid"
  string action_id = 1;
  // Auto-detected device path (e.g., "/dev/sda2")
  // @gotags: validate:"required,startswith=/"
  string device_path = 2;
  // @gotags: validate:"required,min=1"
  string passphrase = 3;
  // Rotation reason: "initial" or "scheduled"
  // @gotags: validate:"required,oneof=initial scheduled"
  string rotation_reason = 4;
}

message StoreLuksKeyResponse {
  bool success = 1;
}

// Server instructs agent to revoke the device-bound key in LUKS slot 7.
// Dispatched as an instant action via the stream.
message RevokeLuksDeviceKey {
  // @gotags: validate:"required,ulid"
  string action_id = 1;
}

// Agent reports the result of revoking the device-bound key.
message RevokeLuksDeviceKeyResult {
  // @gotags: validate:"required,ulid"
  string action_id = 1;
  bool success = 2;
  // @gotags: validate:"omitempty,max=1024"
  string error = 3;
}

// ============================================================================
// LUKS Token Validation (unary RPC for CLI subcommand)
// ============================================================================

message ValidateLuksTokenRequest {
  // @gotags: validate:"required,ulid"
  string device_id = 1;
  // @gotags: validate:"required,uuid"
  string token = 2;
}

message ValidateLuksTokenResponse {
  string action_id = 1;
  // Auto-detected device path from server's stored key data
  string device_path = 2;
  // Minimum passphrase length (>= 16)
  int32 min_length = 3;
  // Complexity requirement for user-defined passphrases
  LpsPasswordComplexity complexity = 4;
}

// ============================================================================
// Action Sync (Agent pulls assigned actions from server)
// ============================================================================

message SyncActionsRequest {
  // @gotags: validate:"required"
  DeviceId device_id = 1;
}

message SyncActionsResponse {
  // All actions currently assigned to this device
  // The agent should replace its local action store with this list
  repeated Action actions = 1;
  // Effective sync interval in minutes for this device
  // Agent should use this for the next sync interval
  // 0 means use default (30 minutes)
  int32 sync_interval_minutes = 2;
}

// ============================================================================
// Log Query (Remote journalctl)
// ============================================================================

// LogSource selects which system log source the agent queries.
// JOURNALD is the default and is what current agents implement;
// SYSLOG slots in for openrc/syslog-ng/rsyslog systems (Alpine, Void,
// legacy Debian/RHEL). Agents must report a clear "source not
// supported on this device" error when asked for a source they can't
// serve.
enum LogSource {
  LOG_SOURCE_JOURNALD = 0;  // default — journalctl
  LOG_SOURCE_SYSLOG = 1;    // syslog files in /var/log (rsyslog, syslog-ng, busybox syslog)
}

// Server -> Agent: request system log output
message LogQuery {
  // @gotags: validate:"required,ulid"
  string query_id = 1;
  // @gotags: validate:"omitempty,gte=0,lte=10000"
  int32 lines = 2;
  // @gotags: validate:"omitempty,max=256"
  string unit = 3;
  // @gotags: validate:"omitempty,max=64"
  string since = 4;
  // @gotags: validate:"omitempty,max=64"
  string until = 5;
  // @gotags: validate:"omitempty,max=32"
  string priority = 6;
  // @gotags: validate:"omitempty,max=256"
  string grep = 7;
  bool kernel = 8;
  // Log source. Defaults to LOG_SOURCE_JOURNALD. Agents without
  // support for a requested source return an error.
  // @gotags: validate:"omitempty"
  LogSource source = 9;
}

// Agent -> Server: journalctl output result
message LogQueryResult {
  // @gotags: validate:"required,ulid"
  string query_id = 1;
  bool success = 2;
  // @gotags: validate:"omitempty,max=1024"
  string error = 3;
  // Raw journalctl output (plain text)
  string logs = 4;
}

// ============================================================================
// Remote Terminal (PTY) Sessions
// ============================================================================
//
// Terminal sessions flow over the existing bidirectional Stream RPC. The
// gateway is the source of truth for active sessions: it bridges WebSocket
// traffic from the web client to the agent and tees stdin to the
// control:inbox queue for audit. Stdout is NOT audited (high volume).
//
// cols/rows use uint32 because proto3 has no uint16. Validation caps both
// at 65535 (the underlying TIOCSWINSZ ioctl uses unsigned shorts).

// Terminal session lifecycle states reported by the agent.
enum TerminalSessionState {
  TERMINAL_SESSION_STATE_UNSPECIFIED = 0;
  // PTY allocated and the shell is running.
  TERMINAL_SESSION_STATE_STARTED = 1;
  // Shell exited cleanly; exit_code is set.
  TERMINAL_SESSION_STATE_EXITED = 2;
  // Session ended with an error (auth, missing TTY user, PTY alloc, etc.);
  // error is populated.
  TERMINAL_SESSION_STATE_ERROR = 3;
}

// Server -> Agent: open a PTY session as the given TTY user.
// The agent must verify that tty_user exists locally and is not disabled
// before allocating the PTY. The shell is activated for the duration of
// the session and reverted to nologin on disconnect.
message TerminalStart {
  // @gotags: validate:"required,ulid"
  string session_id = 1;
  // The dedicated TTY username (e.g. "pm-tty-pdotterer"). The agent
  // never uses the original Linux username for the shell.
  // @gotags: validate:"required,min=1,max=64"
  string tty_user = 2;
  // @gotags: validate:"required,gt=0,lte=65535"
  uint32 cols = 3;
  // @gotags: validate:"required,gt=0,lte=65535"
  uint32 rows = 4;
}

// Server -> Agent: stdin data for an active session.
message TerminalInput {
  // @gotags: validate:"required,ulid"
  string session_id = 1;
  // @gotags: validate:"required,max=65536"
  bytes data = 2;
}

// Server -> Agent: window resize.
// The agent forwards the new size to the PTY via TIOCSWINSZ.
message TerminalResize {
  // @gotags: validate:"required,ulid"
  string session_id = 1;
  // @gotags: validate:"required,gt=0,lte=65535"
  uint32 cols = 2;
  // @gotags: validate:"required,gt=0,lte=65535"
  uint32 rows = 3;
}

// Server -> Agent: terminate an active session.
// The agent SIGTERMs the shell process group and reverts the user's
// shell to nologin. The optional reason is propagated end-to-end from
// ControlService.TerminateTerminalSession through
// GatewayService.TerminateGatewayTerminalSession so the agent can
// surface it in logs and the audit trail captures why the session
// was killed.
message TerminalStop {
  // @gotags: validate:"required,ulid"
  string session_id = 1;
  // @gotags: validate:"omitempty,max=512"
  string reason = 2;
}

// Agent -> Server: stdout/stderr data from the PTY.
message TerminalOutput {
  // @gotags: validate:"required,ulid"
  string session_id = 1;
  // @gotags: validate:"required,max=65536"
  bytes data = 2;
}

// Agent -> Server: session state transition.
// STARTED is sent immediately after the PTY is allocated and the shell
// has begun. EXITED is sent when the shell process exits cleanly, with
// exit_code populated. ERROR is sent for any failure that ends the
// session early, with error populated.
message TerminalStateChange {
  // @gotags: validate:"required,ulid"
  string session_id = 1;
  // @gotags: validate:"required,ne=0"
  TerminalSessionState state = 2;
  // Set when state is EXITED.
  int32 exit_code = 3;
  // Set when state is ERROR.
  // @gotags: validate:"omitempty,max=1024"
  string error = 4;
}
